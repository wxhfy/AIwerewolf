name: CI

env:
  _TEST_ALLOW_FAKE_LLM: "true"
  LLM_PROVIDER: fake
  AIWEREWOLF_STRICT_MODE: "true"
  ALLOW_FALLBACK: "false"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/ scripts/ tests/ configs/
      - run: ruff format --check backend/ scripts/ tests/ configs/

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: werewolf
          POSTGRES_PASSWORD: werewolf_dev_password
          POSTGRES_DB: werewolf
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx
      - run: python -m pytest tests/ -q --timeout=120
