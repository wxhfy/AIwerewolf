# 狼人杀策略库 (Werewolf Strategy Library)
# 来源: 网络检索 + 参考仓库 + 职业赛事分析
# 用途: Agent Prompt 策略注入 / 检索式策略匹配
# 格式: 每条策略 ≤60 字，与 llm_agent.py 截断对齐

# ============================================================
# 一、通用策略 (所有角色共用)
# ============================================================
General:
  # --- 逻辑推理 ---
  logic:
    - "铁逻辑: 真预言家验出的金水一定是好人,查杀一定是狼人"
    - "A发B金水,出B前必先出A;若B是狼则A必是焊跳狼"
    - "正反逻辑都盘:狼人可查杀队友做身份,也可自刀骗药"
    - "多重逻辑化简后只有两层:正逻辑和反逻辑,综合判断"
    - "轮次计算:有查杀优先走查杀,对跳神下轮再说,先票明狼"
    - "算清剩余几狼几神几民,防止被狼人绑票"
  # --- 发言技巧 ---
  speech:
    - "发言要有信息量,不能只说'我觉得他是狼',要给出推理过程"
    - "表水:清晰说出心路历程,为什么投这个人,为什么信那个预言家"
    - "不要乱穿衣服(冒充神职),除非是为了挡刀"
    - "阳光发言减少队友浪费投票机会"
    - "首轮发言很重要,搞错出局方阵会非常被动"
    - "高玩发言语速平稳,模拟思考停顿;紧张语速过快反被当焊跳"
  # --- 投票策略 ---
  vote:
    - "投票要与发言立场一致,发言踩A却投C是重大破绽"
    - "关键轮次(归票轮)关注弃票或分票行为"
    - "收益论:任何行为都服务于阵营胜利,问'对谁最有利'"
    - "警上投票时关注票型,神牌更愿意信真预言家"
  # --- 心理博弈 ---
  psychology:
    - "被质疑时保持冷静,慌乱求生反暴露身份"
    - "对高度怀疑对象连续质询,观察逻辑是否崩塌"
    - "好人的发言带'探索性'和'不确定性',狼人发言常带'确定性'和'引导性'"
    - "沉默寡言≠好人,刻意降低存在感是常见狼人策略"
    - "故意放出半真半假信息(钓鱼执法)观察反应"

# ============================================================
# 二、预言家 (Seer) 策略
# ============================================================
Seer:
  core_strategy:
    - "首轮必须上警竞选警徽,防止悍跳狼误导好人"
    - "发言三部曲:报查验→留警徽流→聊心路历程"
    - "警徽流留两轮:警上一个+警下一个,防止狼两连爆"
    - "查验逻辑:两好人撕警徽,两查杀外置位给,一好一杀给好人"
    - "查到狼当天或次日首发位主动PR,直接报X号是狼"
    - "PR同时给出查验逻辑(为什么选他)以建立可信度"
    - "无查验时必须主动归票分析可疑发言者"
  vote_strategy:
    - "查到狼必须投查到的狼,不允许投别人"
    - "未查到狼时必须站边预言家身份的玩家"
    - "禁止投自己已查的好人"
    - "禁止跟最大票而忽略PR信息"
  skill_strategy:
    - "必须查发言可疑或位置敏感的未验玩家"
    - "禁止查已经验过的玩家"
    - "首夜查发言最异常的未验玩家,不查最像狼或最像神的"
  risk_rules:
    - "查到狼必须当天或次日PR,不留隔夜"
    - "PR后必须用查验逻辑反驳质疑,不能退缩"
    - "面对悍跳狼不能退缩,必须坚定表达正确信息"
    - "不要玩深水预言家套路,悍跳狼会直接踩死你"
  advanced:
    - "狼神级焊跳:选前置位发言,报边缘平民金水(反水概率≈0)"
    - "警徽流留上警玩家,符合预言家逻辑且可后续调整"
    - "状态复刻:语速与真预言家一致,警徽流处故意停顿0.5秒"
    - "退水预案:真预言家报验人是狼队友时立刻退水帮队友号票"

# ============================================================
# 三、女巫 (Witch) 策略
# ============================================================
Witch:
  core_strategy:
    - "解药留给关键身份(预言家/猎人/守卫),毒药只用在确认是狼的玩家"
    - "第一夜禁解药(除非死者是预言家)"
    - "白天少发言,禁止主动暴露女巫身份"
    - "发言基于预言家PR逻辑,不要凭空怀疑"
  skill_strategy:
    - "毒人前必须有≥2条证据(查验+投票+发言)"
    - "禁止同夜同时用解药和毒药"
    - "用完解药后告诉队友,防止狼人假装自刀骗药"
    - "被杀时不要公开救自己,避免暴露女巫身份"
    - "毒后必须沉默,禁止白天承认是自己毒的"
  vote_strategy:
    - "必须跟随预言家定位投票"
    - "禁止投自己解救过的好人"
  risk_rules:
    - "禁止保留药剂,药用完算赢是错误思路"
    - "禁止考虑用药顺序,随便用也是错误"
    - "首夜双药(解毒且开毒)的女巫胜率比单开毒药高18.5%"
    - "信息不明朗的首夜保留解药更稳妥,除非有明确判断依据"
  advanced:
    - "女巫用完解药后失去夜间死亡信息,需在'获取信息'和'直接干预'间抉择"
    - "守卫+女巫'同守同救'可创造奇迹救援,但失误代价也大"
    - "女巫公开身份时机:解药用完后中期站出来表态,猎人跟着站出防误杀"

# ============================================================
# 四、猎人 (Hunter) 策略
# ============================================================
Hunter:
  core_strategy:
    - "白天积极发言,让狼害怕带刀位置"
    - "可以暗示猎人身份信号,但禁止直接跳猎"
    - "出局必须带刀(除非被女巫毒到带不动)"
  skill_strategy:
    - "带刀目标必须首选预言家定位的狼或最可疑玩家"
    - "有把握时才开枪,不了解预言家位置前不随意开枪"
    - "被毒时禁止带刀,必须明确告诉队友'我被毒了带不动'"
  vote_strategy:
    - "必须结合预言家定位投票"
    - "禁止跟大流盲投"
  risk_rules:
    - "禁止前期主动跳猎人身份"
    - "猎人不能在被毒死时开枪,规则限制需牢记"
    - "最后一个神牌不能开枪,增加终局战术考量"
  advanced:
    - "中期女巫解药用完公开身份后,猎人跟着站出来防被女巫误杀"
    - "猎人的威慑力在于'谁踩我我就带走谁',让狼不敢轻举妄动"
    - "最后的子弹要用来为阵营争取胜利,不能浪费"

# ============================================================
# 五、守卫 (Guard) 策略
# ============================================================
Guard:
  core_strategy:
    - "白天隐藏身份,禁止主动跳守卫"
    - "通过逻辑推理参与归票分析"
    - "优先守预言家/女巫/猎人等关键身份"
  skill_strategy:
    - "禁止连续两夜守同一个玩家"
    - "首夜可以守自己,之后只守关键身份"
    - "分析狼人攻击模式,预判目标实现精准守护"
    - "宁可空守也不要守可疑玩家"
  vote_strategy:
    - "必须结合预言家查验和场上发言投票"
  risk_rules:
    - "禁止让自己被狼盯死"
    - "守卫的生存对好人至关重要,苟着才是最具威胁的状态"
  advanced:
    - "守卫+女巫'同守同救':守卫守A+女巫救A→A不死(经典救援)"
    - "守卫守A+女巫救B(不同人)→若A被刀则A死(守卫不防女巫毒)"
    - "预测狼人刀法:轮次紧迫时守最可能被刀的神牌"

# ============================================================
# 六、狼人 (Werewolf) 策略
# ============================================================
Werewolf:
  # --- 角色分工 ---
  roles:
    - "悍跳狼:冒充预言家,争夺警徽,混淆好人视线"
    - "冲锋狼:站边悍跳狼,重点打压真预言家"
    - "倒钩狼:站队真预言家,混入好人队伍获取信任"
    - "深水狼:老老实实和平民一样表水,低调存活"
    - "垫飞狼:站真预言家但发言爆炸,让真预言家被怀疑"
  # --- 悍跳策略 ---
  bluff:
    - "竞选警长时悍跳预言家,获取发言主导权"
    - "报验人选择:前置位边缘平民(反水概率≈0)"
    - "警徽流留上警玩家,符合预言家逻辑"
    - "状态复刻:语速平稳,警徽流处故意停顿模拟思考"
    - "退水预案:真预言家报验人是狼队友时立刻退水"
    - "复刻预言家真实感,不要演得用力过猛"
  # --- 伪装策略 ---
  disguise:
    - "积极发言伪装好人,可以跳神争取信任"
    - "为队友提供合理化解释,但禁止互相吹捧"
    - "发言模式不要和队友过于相似,避免被看出狼队"
    - "模仿平民发言方式,积极参与讨论为好人出谋划策"
    - "深水狼:女巫用完毒药后可大胆跳女巫坐实身份"
  # --- 刀人策略 ---
  kill_priority:
    - "夜里必须优先刀关键身份:预言家>女巫>猎人>守卫"
    - "女巫有解药和毒药是首要击杀目标"
    - "守卫能守护关键角色其次考虑击杀"
    - "预言家查验身份威胁较大也在优先击杀"
    - "当n/3天后守卫重要性上升,调整刀人优先级"
    - "首夜首选预言家(若已PR)或最爱发言的位置"
  # --- 投票策略 ---
  vote_strategy:
    - "禁止投自己的狼队友"
    - "必须投威胁最大的神职或最可疑的好人"
    - "冲票时统一行动,通过暗号给队友递话"
  # --- 控场策略 ---
  control:
    - "引导好人内斗,不要靠喊票"
    - "利用'模糊身份'制造好人之间的猜疑"
    - "狼队友倒钩时配合:队友轻微踩你反而强化你身份"
    - "被归票时冷静从闭眼玩家角度分析,指出好人逻辑漏洞"
    - "确定被顺出时可选择自爆,中断好人讨论争取时间"
  # --- 抿人(读人)策略 ---
  read_players:
    - "状态抿人:神牌发言藏身份时卡顿,猎人发言带攻击性"
    - "卦象抿人:微动作判断,如反复看牌→预言家,摸脖子→紧张"
    - "票型抿人:警上投票信真预言家的大概率是强神"
    - "女巫刻意避免提到'解药''毒药'相关词→锁定女巫"
    - "三维抿人:状态+卦象+票型,第一天可点出三个神牌"
  # --- 风险规则 ---
  risk_rules:
    - "必须保护队友不被暴露"
    - "禁止发言模式过于相似让别人看出"
    - "被轻微怀疑时穿神衣服自保,被严重怀疑时表现坦然"
    - "出卖队友要谨慎,不要轻易抛弃队友"
    - "自刀风险高,需对所有玩家有了解后再决定"
  # --- 高级策略 ---
  advanced:
    - "阴阳倒钩:站队真预言家但故意表现差,让好人怀疑预言家"
    - "反逻辑冲锋:明目张胆站队狼队友,利用好人的反逻辑思维"
    - "狼人可查杀队友做身份(A预言家查杀B,B自爆→A一定是好人?)"
    - "利用狼队友的倒钩强化自己身份:倒钩狼轻微踩你=你不是狼"
    - "投票时统一行动:摸耳朵等暗号让队友知道投谁"
    - "混合策略:以20%概率说谎(经验阈值),平衡诚实与欺骗"

# ============================================================
# 七、村民 (Villager) 策略
# ============================================================
Villager:
  core_strategy:
    - "村民是票型决定者,不要只'跟着投'"
    - "表水:清晰说出心路历程和推理逻辑"
    - "不要乱穿衣服(冒充神职),乱跳会导致神职暴露"
    - "阳光发言减少队友浪费投票机会"
  speech_strategy:
    - "首轮老老实实表水,但不能太划水"
    - "为好人提供更多信息,阳光好人发言可减少队友误投"
    - "注意每个人发言时的表情、语气和动作判断身份"
    - "关注票型,投票行为与发言立场一致性分析"
  advanced:
    - "可以上警跳强神欺诈身份后及时退水(挡刀战术)"
    - "村民的核心价值在于'逻辑分析+投票引导'"
    - "不要寻找神职,容易被标记为狼"

# ============================================================
# 八、板子配置 (Board Configurations)
# ============================================================
BoardConfigs:
  classic_6:
    desc: "6人经典新手局"
    config: "2狼 + 1预言家 + 1女巫 + 2村民"
  classic_9:
    desc: "9人标准局"
    config: "3狼 + 3神(预女猎) + 3村民"
  classic_12:
    desc: "12人竞技局(最常见)"
    config: "4狼 + 4神(预女猎守/白) + 4村民"
  wolf_king_12:
    desc: "12人狼王局"
    config: "3小狼+1狼王 + 预女猎守 + 4村民"
  white_wolf_king_12:
    desc: "12人白狼王局"
    config: "3小狼+1白狼王 + 预女猎守 + 4村民"
  wolf_beauty_12:
    desc: "12人狼美人局"
    config: "3小狼+1狼美人 + 预女猎守 + 4村民"
  dual_king_12:
    desc: "12人双王局(高级)"
    config: "2小狼+1狼王+1白狼王 + 预女猎守 + 4村民"

# ============================================================
# 九、博弈论视角策略 (Game Theory)
# ============================================================
GameTheory:
  estimation:
    - "将游戏阶段视为子博弈,估算各角色最优策略"
    - "估计预言家:一致性发言报查验者最可能是真预言家"
    - "估计女巫:最能识别预言家身份的可能是女巫"
    - "估计守卫:无人死亡时请求守护者可能是守卫"
    - "估计狼人:投票给被投出村民者可能是狼人"
  attack_priority:
    - "狼人攻击优先级:预言家>守卫>女巫(随游戏进展调整)"
    - "当游戏天数>n/3时,守卫重要性超过预言家"
    - "无估计目标时跟随多数狼人攻击意向"
  mixed_strategy:
    - "混合策略:以概率p说谎(经验值p=0.2)平衡诚实与欺骗"
    - "纯诚实易被识破,纯欺骗难以引导投票"
    - "信息不完全时采用贝叶斯更新策略"

# ============================================================
# 十、村民阵营协作策略 (Village Coordination)
# ============================================================
VillageCoordination:
  seer_witch_guard:
    - "预言家+女巫+守卫三人协作：预言家报查验→女巫用药保预言家→守卫守预言家→链条不断好人必胜"
    - "守卫首夜守预言家，女巫首夜用解药救刀口（获取银水信息），第二天预言家跳身份报查验"
    - "女巫解药用完后立即跳身份报银水，提供额外好人线索，压缩狼人生存空间"
    - "预言家被刀后女巫+守卫立即跳身份带队，不要让好人失去方向"
  village_voting:
    - "村民必须统一投票！分票是狼人的机会——好人分票=狼人控场"
    - "有预言家查验时所有人必须跟验投票，不跟票的人大概率是狼"
    - "投票不一致的玩家要质疑——为什么你不跟预言家的归票？你的逻辑是什么？"
    - "关键轮次（放逐轮）弃票=帮狼人，必须追责"
  information_sharing:
    - "好人信息共享最大化：预言家报查验→女巫报银水→守卫报守护→猎人暗示存在→村民分析整合"
    - "神职适当跳身份的好处：减少信息差+压缩狼人伪装空间+给村民清晰站边目标"
    - "隐藏身份不等于永远不跳——关键时刻（保真预言家/解释信息差）跳身份是必要的"
  anti_wolf_tactics:
    - "识别焊跳狼：真预言家查验逻辑自洽且有连续警徽流，焊跳狼验人逻辑生硬或没有后续"
    - "关注票型异常：多人分票时一定有狼人在操控，找出分票的源头"
    - "沉默玩家≠好人：狼人常见的策略是降低存在感，对沉默玩家也要施加发言压力"
    - "好人被围攻时站出来的不一定是狼——可能是神职在暗示身份"

# ============================================================
# 十一、职业赛事高级策略 (Pro Play)
# ============================================================
ProPlay:
  wolf_god_tactics:
    - "狼神焊跳:选前置位第一个发言,报边缘平民金水"
    - "警徽流留上警玩家3号和7号,符合预言家逻辑"
    - "语速复刻真预言家,警徽流处故意停顿0.5秒"
    - "退水预案:真预言家报狼队友时立刻退水帮号票"
  mianren_reading:
    - "状态抿人:神牌发言藏身份时会卡顿"
    - "卦象抿人:反复看牌→预言家,摸脖子→猎人"
    - "票型抿人:投给真预言家且不划水→守卫"
