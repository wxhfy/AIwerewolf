# ============================================================================
# AI Werewolf — Full-stack Docker Compose
# ============================================================================
# Quick start:
#   docker compose up -d              # start everything
#   docker compose --profile dev up   # dev mode (hot-reload + exposed ports)
# ============================================================================

services:
  # ------------------------------------------------------------------
  # PostgreSQL 15
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: werewolf-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: werewolf
      POSTGRES_PASSWORD: wolf_secret_2026
      POSTGRES_DB: werewolf
    ports:
      - "5433:5432"
    volumes:
      - werewolf-pg-data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U werewolf -d werewolf"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - werewolf-net

  # ------------------------------------------------------------------
  # FastAPI Backend
  # ------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: werewolf-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://werewolf:wolf_secret_2026@postgres:5432/werewolf
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      DOUBAO_BASE_URL: ${DOUBAO_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      DOUBAO_MODEL: ${DOUBAO_MODEL:-Doubao-Seed-2.0-pro}
      DOUBAO_ENDPOINT: ${DOUBAO_ENDPOINT:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      AIWEREWOLF_STRICT_MODE: ${AIWEREWOLF_STRICT_MODE:-true}
      ALLOW_FALLBACK: ${ALLOW_FALLBACK:-false}
      AUTO_MIGRATE: "true"
    networks:
      - werewolf-net

  # ------------------------------------------------------------------
  # Next.js Frontend
  # ------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: werewolf-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost/ws}
    networks:
      - werewolf-net

  # ------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: werewolf-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - werewolf-net

  # ------------------------------------------------------------------
  # Dev profile — exposed ports + hot-reload mounts
  # ------------------------------------------------------------------
  dev-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: werewolf-dev-backend
    profiles: ["dev"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://werewolf:wolf_secret_2026@postgres:5432/werewolf
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      AIWEREWOLF_STRICT_MODE: "true"
      AUTO_MIGRATE: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./configs:/app/configs
      - ./scripts:/app/scripts
    command: uvicorn backend.app:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - werewolf-net

  dev-frontend:
    image: node:20-alpine
    container_name: werewolf-dev-frontend
    profiles: ["dev"]
    restart: unless-stopped
    depends_on:
      - dev-backend
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    networks:
      - werewolf-net

networks:
  werewolf-net:
    name: werewolf-net
    driver: bridge

volumes:
  werewolf-pg-data:
    name: werewolf-pg-data
