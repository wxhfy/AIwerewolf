# 受控实验用策略目录：5 角色 × 2 变体（good = 贴合 role_task 得分；bad = 镜像 bad_case 失误模式）
#
# 用法：被 scripts/score_discrimination_experiment.py 加载，按 (role, variant) 取出 strategy_bias
# 字典后通过 WerewolfGame(strategy_bias_by_role={role: bias_dict}) 注入 — 只影响目标角色的 prompt。
#
# 每个 section 限制 ≤ 3 条、每条 ≤ 60 字 — 与 backend/agents/llm_agent.py:261 的 [:3] 截断对齐。
#
# 决策依据：
# - role_task 公式（review.py:1592-1667）：每角色不同子项加权
# - bad_case 检测（review.py:1175-1300）：每角色不同的失误模式扣分

Seer:
  good:
    speech_policy:
      - "查到任何狼必须当天或第二天首发位主动 PR,直接报X号是狼"
      - "PR 时同时给出查验逻辑(为什么选他)以建立可信度"
      - "无查验时必须主动归票分析可疑发言者"
    vote_policy:
      - "查到狼必须投查到的狼,不允许投别人"
      - "未查到狼时必须站边预言家身份的玩家"
      - "禁止投自己已查的好人"
    skill_policy:
      - "必须查发言可疑或位置敏感的未验玩家"
      - "禁止查已经验过的玩家"
    risk_rules:
      - "查到狼必须当天或次日 PR,不留隔夜"
      - "PR 后必须用查验逻辑反驳质疑,不能退缩"
  bad:
    speech_policy:
      - "禁止公开查验结果,无论查到狼还是民都不要 PR"
      - "白天发言禁止透露任何身份信号,装作普通村民"
      - "遇到质疑必须退缩,不要为查验辩护"
    vote_policy:
      - "禁止投查到的狼,改投随机其他玩家或弃票"
      - "投票必须跟最多人,不允许独立判断"
    skill_policy:
      - "必须查发言最少最不可能是狼的玩家"
      - "允许重复查同一个人"
    risk_rules:
      - "必须保持沉默到死,绝对不能 PR"
      - "查到狼也必须假装不知道,继续按民玩"

Witch:
  good:
    speech_policy:
      - "白天必须少发言,禁止主动暴露女巫身份"
      - "发言必须基于预言家查验逻辑,不能凭空怀疑"
    vote_policy:
      - "必须跟随预言家定位投票"
      - "禁止投自己解救过的好人"
    skill_policy:
      - "解药必须留给关键身份(预言家/猎人/守卫)"
      - "毒药必须只用在确认是狼的玩家身上"
      - "禁止第一夜用解药(除非死者是预言家)"
    risk_rules:
      - "毒人前必须有 ≥2 条证据(查验/投票/发言)"
      - "禁止同夜同时用解药和毒药"
  bad:
    speech_policy:
      - "白天必须大声指责任何看起来可疑的玩家"
      - "必须主动暴露女巫身份求关注"
    vote_policy:
      - "禁止参考预言家信息,投谁不重要"
      - "允许投自己刚救过的人"
    skill_policy:
      - "第一夜必须用解药救任何死者,无论身份"
      - "白天必须毒任何被怀疑的玩家,无需证据"
    risk_rules:
      - "禁止保留药剂,药用完算赢"
      - "禁止考虑用药顺序,随便用"

Hunter:
  good:
    speech_policy:
      - "白天必须积极发言,让狼害怕带刀位置"
      - "可以暗示猎人身份信号,但禁止直接跳猎"
    vote_policy:
      - "必须结合预言家定位投票"
      - "禁止跟大流盲投"
    skill_policy:
      - "出局必须带刀(除非被女巫毒到带不动)"
      - "带刀目标必须首选预言家定位的狼或最可疑玩家"
    risk_rules:
      - "禁止前期主动跳猎人身份"
      - "被毒时禁止带刀,必须明确告诉队友"
  bad:
    speech_policy:
      - "白天必须保持沉默,装作普通村民"
      - "禁止暗示自己是猎人,无论局势如何"
    vote_policy:
      - "投票必须随机或跟声音最大的玩家"
    skill_policy:
      - "出局时禁止带刀,或者随便指向任何玩家"
      - "带刀目标必须是好人或预言家"
    risk_rules:
      - "禁止考虑战术,怎么舒服怎么打"

Guard:
  good:
    speech_policy:
      - "白天必须隐藏身份,禁止主动跳守卫"
      - "通过逻辑推理参与归票分析"
    vote_policy:
      - "必须结合预言家查验和场上发言投票"
    skill_policy:
      - "必须优先守预言家/女巫/猎人"
      - "禁止连续两夜守同一个玩家"
      - "第一夜可以守自己,之后只守关键身份"
    risk_rules:
      - "禁止让自己被狼盯死"
      - "宁可不守,也不要守可疑玩家"
  bad:
    speech_policy:
      - "必须随时主动跳守卫身份"
    vote_policy:
      - "投票必须随机"
    skill_policy:
      - "必须每夜守同一个玩家,最好守自己"
      - "允许守明显是狼的玩家"
    risk_rules:
      - "禁止考虑战术,怎么舒服怎么打"

Werewolf:
  good:
    speech_policy:
      - "白天必须积极发言伪装好人,可以跳神争取信任"
      - "为队友提供合理化解释,但禁止互相吹捧"
    vote_policy:
      - "禁止投自己的狼队友"
      - "必须投威胁最大的神职或最可疑的好人"
    skill_policy:
      - "夜里必须优先刀关键身份(预言家/猎人/女巫)"
      - "必须和队友夜里讨论达成一致再行动"
    risk_rules:
      - "必须保护队友不被暴露"
      - "禁止发言模式过于相似让别人看出"
  bad:
    speech_policy:
      - "白天必须保持沉默或自相矛盾"
      - "禁止伪装好人,反正狼有夜会"
    vote_policy:
      - "允许投自己的狼队友"
      - "投票必须随机或跟好人投"
    skill_policy:
      - "夜里必须刀普通村民,禁止刀神职"
      - "禁止和队友达成共识"
    risk_rules:
      - "允许暴露队友关系"
      - "禁止保护队友"

