name: CI

env:
  _TEST_ALLOW_FAKE_LLM: "true"
  LLM_PROVIDER: fake
  AIWEREWOLF_SKIP_DOTENV: "true"
  AIWEREWOLF_STRICT_MODE: "true"
  ALLOW_FALLBACK: "false"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/ tests/ configs/ scripts/e2e_smoke.py scripts/verify_visibility_strict.py
      - run: ruff format --check backend/ tests/ configs/ scripts/e2e_smoke.py scripts/verify_visibility_strict.py

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -q --timeout=120

  frontend:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run build
