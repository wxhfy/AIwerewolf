<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Werewolf</title>
<link rel="stylesheet" href="/static/style.css?v=5" />
</head>
<body>
<main class="shell">
  <!-- TOP BAR -->
  <header class="topbar">
    <span class="brand">AI Werewolf</span>
    <div class="topbar-controls">
      <select id="mode-select" class="top-select" aria-label="game mode">
        <option value="ai">AI vs AI</option>
        <option value="human">AI + Human</option>
      </select>
      <select id="agent-type" class="top-select" aria-label="agent type">
        <option value="llm">LLM</option>
        <option value="heuristic">Heuristic</option>
      </select>
      <select id="player-count" class="top-select" aria-label="player count">
        <option value="7">7P</option>
        <option value="8">8P</option>
        <option value="9">9P</option>
        <option value="10">10P</option>
        <option value="11">11P</option>
        <option value="12">12P</option>
      </select>
      <select id="human-seat" class="top-select" aria-label="human seat">
        <option value="1">Seat 1</option>
        <option value="2">Seat 2</option>
        <option value="3">Seat 3</option>
        <option value="4">Seat 4</option>
        <option value="5">Seat 5</option>
        <option value="6">Seat 6</option>
        <option value="7">Seat 7</option>
      </select>
      <div class="lang-switch">
        <button id="lang-zh" class="lang-btn active">中</button>
        <button id="lang-en" class="lang-btn">EN</button>
      </div>
      <button id="private" class="btn-ghost" data-i18n="private">主持视角</button>
      <button id="run" class="btn-primary" data-i18n="run">开始游戏</button>
    </div>
  </header>

  <!-- GAME STATUS -->
  <div class="game-status" id="game-status">
    <span class="status-day" id="status-day">-</span>
    <span class="status-phase" id="status-phase" data-i18n="statusReady">点击开始游戏</span>
    <span class="status-room" id="status-room">Room -</span>
  </div>

  <section class="action-panel hidden" id="action-panel">
    <div class="action-copy">
      <div class="action-kicker">Human Turn</div>
      <h3 id="action-title">等待你的行动</h3>
      <p id="action-prompt"></p>
      <div class="action-timer hidden" id="action-timer">
        <span class="timer-label" data-i18n="timeLeft">剩余时间</span>
        <span class="timer-value" id="action-timer-value">60s</span>
      </div>
    </div>
    <div class="action-form">
      <div class="action-speech-wrap">
        <textarea id="action-speech" rows="3" placeholder="输入你的发言..."></textarea>
        <button id="action-voice" class="voice-btn" type="button" title="语音输入" aria-label="语音输入">🎤</button>
      </div>
      <div class="voice-hint hidden" id="voice-hint">正在聆听…再次点击麦克风停止</div>
      <label class="action-label">
        <span>Target</span>
        <select id="action-target"></select>
      </label>
      <label class="action-check">
        <input id="action-save" type="checkbox" />
        <span>Use save potion</span>
      </label>
      <button id="action-submit" class="btn-primary">提交行动</button>
    </div>
  </section>

  <!-- MAIN LAYOUT: history + players-left + center + players-right -->
  <div class="arena">
    <!-- LEFT SIDEBAR: history -->
    <aside class="history-sidebar">
      <h3 class="sidebar-title" data-i18n="history">历史对局</h3>
      <div class="history-list" id="history-panel"></div>
    </aside>

    <!-- LEFT COLUMN: first half of players -->
    <section class="player-column" id="players-left"></section>

    <!-- CENTER: game flow by day -->
    <section class="flow-column" id="flow">
      <div class="flow-placeholder" data-i18n="statusHint">点击"开始游戏"按钮，观看 AI 狼人杀对局</div>
    </section>

    <!-- RIGHT COLUMN: second half of players -->
    <section class="player-column" id="players-right"></section>
  </div>

  <!-- WINNER BANNER (hidden until game end) -->
  <div class="winner-banner hidden" id="winner-banner">
    <span class="winner-label" data-i18n="winner">胜者</span>
    <strong class="winner-name" id="winner-text">-</strong>
  </div>
</main>
<script src="/static/app.js?v=5"></script>
</body>
</html>
